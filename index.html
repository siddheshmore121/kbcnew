<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBC Pro - Group Edition</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif;
            background: radial-gradient(circle at center, #1a1a4d 0%, #0a0a2e 70%, #05051a 100%);
            color: white; min-height: 100vh; display: flex;
            justify-content: center; align-items: center; overflow-x: hidden;
        }
        #landing, #group-select, #level-select, #quiz-ready, #game {
            width: 95%; max-width: 900px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background: rgba(10, 10, 50, 0.9); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 40px; border: 2px solid #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); margin: 10px;
        }
        .hidden { display: none !important; }
        .kbc-logo { width: 100px; margin-bottom: 10px; filter: drop-shadow(0 0 10px #ffd700); }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; width: 100%; }
        .lifeline-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .lifeline {
            width: 80px; height: 50px; border: 2px solid #ffd700; border-radius: 25px;
            background: rgba(255, 215, 0, 0.1); cursor: pointer; display: flex;
            justify-content: center; align-items: center; font-weight: bold; font-size: 16px;
            transition: 0.3s; color: #ffd700;
        }
        .lifeline:hover { background: #ffd700; color: #000; }
        .lifeline.used { opacity: 0.3; pointer-events: none; background: #555 !important; border-color: #888; color: #fff; }
        .chance-box {
            font-size: 18px; color: #ff4d4d; font-weight: bold; margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.1); padding: 5px 15px; border-radius: 20px;
        }
        .btn-choice {
            padding: 15px; border-radius: 15px; border: 2px solid #ffd700;
            background: rgba(255, 215, 0, 0.1); color: #ffd700; font-size: 16px;
            cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .btn-choice:hover { background: #ffd700; color: #000; }
        .btn-main {
            padding: 12px 40px; background: linear-gradient(180deg, #ffd700 0%, #b8860b 100%);
            border: 2px solid #fff; border-radius: 40px; cursor: pointer;
            font-weight: bold; font-size: 18px; color: #000; margin-top: 15px;
        }
        .question-box {
            width: 100%; padding: 20px; background: linear-gradient(90deg, #00004d 0%, #000099 50%, #00004d 100%);
            border-radius: 50px; border: 2px solid #ffd700; font-size: 20px; margin-bottom: 20px; box-sizing: border-box;
        }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .option {
            background: rgba(0, 0, 100, 0.7); padding: 12px; border-radius: 40px;
            border: 1.5px solid #4da6ff; cursor: pointer; font-size: 17px; transition: 0.2s; visibility: hidden;
            text-align: left; padding-left: 25px;
        }
        .option-prefix { color: #ffd700; font-weight: bold; margin-right: 10px; }
        .locked { background: #ffa500 !important; color: black; border-color: #fff; }
        .correct { background: #2ecc71 !important; color: white; border-color: #fff; }
        .wrong { background: #e74c3c !important; color: white; border-color: #fff; }
        #timer-container {
            width: 65px; height: 65px; border-radius: 50%; border: 3px solid #ffd700;
            display: flex; justify-content: center; align-items: center; font-size: 24px;
            margin-bottom: 10px; background: #cc0000; font-weight: bold; visibility: hidden;
        }
        .q-counter { color: #ffd700; font-size: 16px; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="landing">
        <img src="kbc.png" class="kbc-logo">
        <h1 style="color: #ffd700;">“भीम ज्ञान स्पर्धा 2026”</h1>
        <button class="btn-main" onclick="showGroups()">खेळायला सुरुवात करा</button>
    </div>

    <div id="group-select" class="hidden">
        <h2 style="color: #ffd700;">तुमचा गट निवडा</h2>
        <div class="grid-container">
            <button class="btn-choice" onclick="selectGroup('chota')">१. लहान गट<br>(इ. ४ थी ते ७ वी)</button>
            <button class="btn-choice" onclick="selectGroup('medium')">२. मध्यम गट<br>(इ. ८ वी ते १० वी)</button>
            <button class="btn-choice" onclick="selectGroup('open')">३. ओपन गट<br>(सर्व वयोगट)</button>
        </div>
    </div>

    <div id="level-select" class="hidden">
        <h2 id="level-title" style="color: #ffd700;">विषय निवडा</h2>
        <div class="grid-container" id="level-buttons"></div>
        <button class="btn-main" onclick="showGroups()" style="font-size: 14px;">मागे जा</button>
    </div>

    <div id="quiz-ready" class="hidden">
        <h2 id="ready-title" style="color: #ffd700;">तुम्ही तयार आहात का?</h2>
        <p id="ready-info" style="font-size: 18px; white-space: pre-line;"></p>
        <button class="btn-main" onclick="actualStartGame()">क्विझ सुरू करा!</button>
    </div>

    <div id="game" class="hidden">
        <div class="lifeline-container">
            <div class="lifeline" id="l-5050" onclick="useLifeline('5050')">50:50</div>
            <div class="lifeline" id="l-poll" onclick="useLifeline('poll')">👥 Poll</div>
        </div>
        <div class="chance-box" id="chance-display">संधी: ❤️ ❤️</div>
        <div class="q-counter" id="question-number">प्रश्न: ०/०</div>
        <div id="timer-container"><span id="timer">45</span></div>
        <div class="question-box" id="question">प्रश्न लोड होत आहे...</div>
        <div class="options" id="options"></div>
        <button id="showOptionsBtn" class="btn-main" onclick="startQuestionTimer()">पर्याय दाखवा आणि वेळ सुरू करा</button>
        <button id="nextBtn" class="btn-main hidden" onclick="nextQ()">पुढचा प्रश्न</button>
    </div>

    <script>
        const audioIntro = new Audio('intro.mp3');
        const audioTimer = new Audio('timer.mp3');
        const audioLock = new Audio('lock.mp3');
        const audioCorrect = new Audio('correct.mp3');
        const audioWrong = new Audio('wrong.mp3');
        audioTimer.loop = true;

        // --- लहान गट संच (Set 1 to 5) ---
        const setA = [
            {q:"डॉ. बाबासाहेब आंबेडकर यांचा जन्म कोणत्या वर्षी झाला?", opt:["1890","1891","1892","1900"], ans:1},
            {q:"बाबासाहेबांचे वडीलांचे नाव काय होते?", opt:["रामजी सकपाळ","गोविंदराव","शहाजीराजे","तुकाराम"], ans:0},
            {q:"भारतातील राष्ट्रीय पक्षी कोणता आहे?", opt:["चिमणी","मोर","कावळा","कबूतर"], ans:1},
            {q:"भारतीय संविधान कोणी तयार केले?", opt:["संसद","संविधान सभा","न्यायालय","राष्ट्रपती"], ans:1},
            {q:"भारताचा राष्ट्रीय प्राणी कोणता आहे?", opt:["सिंह","वाघ","हत्ती","घोडा"], ans:1},
            {q:"बाबासाहेबांची आईचे नाव काय होते?", opt:["रमाबाई","भीमाबाई","लक्ष्मीबाई","सावित्रीबाई"], ans:1},
            {q:"भारताचे राष्ट्रगीत कोणी लिहिले?", opt:["गांधीजी","रवींद्रनाथ टागोर","नेहरू","आंबेडकर"], ans:1},
            {q:"भारताचा ध्वज कोणत्या रंगांनी बनलेला आहे?", opt:["लाल, पिवळा, हिरवा","केशरी, पांढरा, हिरवा","निळा, लाल, पांढरा","काळा, पांढरा, हिरवा"], ans:1},
            {q:"संविधान कधी लागू झाले?", opt:["1947","1950","1949","1960"], ans:1},
            {q:"भारताचे चलन काय आहे?", opt:["डॉलर","रुपया","येन","पाउंड"], ans:1}
        ];

        const setB = [
            {q:"बाबासाहेबांचे स्मारक (चैत्यभूमी) कोठे आहे?", opt:["पुणे","मुंबई","नागपूर","दिल्ली"], ans:1},
            {q:"बाबासाहेबांनी कोणते वृत्तपत्र सुरू केले?", opt:["केसरी","मूकनायक","मराठा","जनता"], ans:1},
            {q:"भारतातील सर्वोच्च पद कोणते आहे?", opt:["पंतप्रधान","राष्ट्रपती","मुख्यमंत्री","न्यायाधीश"], ans:1},
            {q:"संविधान दिन कधी साजरा करतात?", opt:["15 ऑगस्ट","26 जानेवारी","26 नोव्हेंबर","2 ऑक्टोबर"], ans:2},
            {q:"गौतम बुद्धांचा जन्म कोठे झाला?", opt:["गया","लुंबिनी","सारनाथ","कुशीनगर"], ans:1},
            {q:"बाबासाहेबांनी कोणता नारा दिला?", opt:["जय हिंद","करो या मरो","शिका, संघटित व्हा, संघर्ष करा","वंदे मातरम्"], ans:2},
            {q:"भारतीय संसद कोणत्या दोन सभांनी बनलेली आहे?", opt:["ग्रामसभा व पंचायत","लोकसभा व राज्यसभा","विधानसभा व परिषद","न्यायालय व संसद"], ans:1},
            {q:"भारताचे पहिले राष्ट्रपती कोण होते?", opt:["नेहरू","राजेंद्र प्रसाद","गांधी","पटेल"], ans:1},
            {q:"भारताचा राष्ट्रीय फुल कोणते आहे?", opt:["गुलाब","कमळ","जाई","मोगरा"], ans:1},
            {q:"भारताची राजधानी कोणती आहे?", opt:["मुंबई","दिल्ली","पुणे","चेन्नई"], ans:1}
        ];

        const setC = [
            {q:"बाबासाहेबांनी बौद्ध धर्म कधी स्वीकारला?", opt:["1947","1956","1950","1960"], ans:1},
            {q:"बाबासाहेब भारताचे पहिले कोणते मंत्री होते?", opt:["शिक्षण मंत्री","गृहमंत्री","कायदा मंत्री","संरक्षण मंत्री"], ans:2},
            {q:"भारतातील कायदे कोण बनवते?", opt:["न्यायालय","संसद","राष्ट्रपती","मुख्यमंत्री"], ans:1},
            {q:"भारताचा राष्ट्रीय खेळ कोणता?", opt:["क्रिकेट","हॉकी","फुटबॉल","कवडी"], ans:1},
            {q:"आपण देशाचा आदर कसा करतो?", opt:["कचरा टाकून","स्वच्छता ठेवून","भांडून","पळून"], ans:1},
            {q:"महाडचा चवदार तळे सत्याग्रह कोणी केला?", opt:["गांधीजी","बाबासाहेब आंबेडकर","नेहरू","टिळक"], ans:1},
            {q:"भारताचे पहिले पंतप्रधान कोण होते?", opt:["नेहरू","पटेल","आंबेडकर","राजेंद्र प्रसाद"], ans:0},
            {q:"भारताचे राष्ट्रीय फळ कोणते?", opt:["सफरचंद","आंबा","केळी","पेरू"], ans:1},
            {q:"शिक्षक दिन कोणाच्या स्मरणार्थ साजरा करतात?", opt:["गांधी","राधाकृष्णन","नेहरू","आंबेडकर"], ans:1},
            {q:"महाराष्ट्राची राजधानी कोणती?", opt:["पुणे","मुंबई","नागपूर","नाशिक"], ans:1}
        ];

        const setD = [
            {q:"बाबासाहेबांनी उच्च शिक्षण कोठे घेतले?", opt:["फक्त भारत","अमेरिका आणि लंडन","फक्त चीन","फक्त जपान"], ans:1},
            {q:"भारतीय राज्यघटनेचे शिल्पकार कोणास म्हणतात?", opt:["नेहरू","आंबेडकर","गांधी","पटेल"], ans:1},
            {q:"इंद्रधनुष्यात किती रंग असतात?", opt:["५","६","७","८"], ans:2},
            {q:"सूर्याची पहिली किरणे कोणत्या दिशेला दिसतात?", opt:["पश्चिम","उत्तर","दक्षिण","पूर्व"], ans:3},
            {q:"आपला राष्ट्रीय प्राणी वाघ कोणत्या गटात येतो?", opt:["शाकाहारी","मांसाहारी","उभयाहारी","कीटकभक्षक"], ans:1},
            {q:"एका वर्षात किती महिने असतात?", opt:["१०","११","१२","१३"], ans:2},
            {q:"महाराष्ट्राचे आराध्य दैवत कोण?", opt:["शिवाजी महाराज","विठ्ठल","गणपती","वरील सर्व"], ans:3},
            {q:"शाळेत आपण प्रार्थना कोठे करतो?", opt:["मैदानावर","रस्त्यावर","बागेत","घरी"], ans:0},
            {q:"स्वच्छ भारत अभियान कशासाठी आहे?", opt:["घाण करण्यासाठी","स्वच्छतेसाठी","खेळण्यासाठी","झोपण्यासाठी"], ans:1},
            {q:"भारताचा राष्ट्रीय वृक्ष कोणता?", opt:["आंबा","वड","नारळ","पिंपळ"], ans:1}
        ];

        const setE = [
            {q:"बाबासाहेबांचे मूळ गाव कोणते?", opt:["महू","आंबडवे","महाड","पुणे"], ans:1},
            {q:"'सत्यमेव जयते' हे वाक्य कोठून घेतले आहे?", opt:["रामायण","महाभारत","मुंडक उपनिषद","गीता"], ans:2},
            {q:"२६ जानेवारीला कोणता दिवस असतो?", opt:["स्वातंत्र्य दिन","प्रजासत्ताक दिन","कामगार दिन","शिक्षक दिन"], ans:1},
            {q:"पांढरा रंग कशाचे प्रतीक आहे?", opt:["युद्ध","शांती","क्रांती","भीती"], ans:1},
            {q:"संगणकाचा मेंदू कोणाला म्हणतात?", opt:["माऊस","कीबोर्ड","CPU","मॉनिटर"], ans:2},
            {q:"भारतातील सर्वात मोठी नदी कोणती?", opt:["यमुना","गंगा","गोदावरी","नर्मदा"], ans:1},
            {q:"पृथ्वी स्वतःभोवती फिरते याला काय म्हणतात?", opt:["परिभ्रमण","परिवलन","ग्रहण","भरती"], ans:1},
            {q:"एका तासात किती मिनिटे असतात?", opt:["३०","४५","६०","९०"], ans:2},
            {q:"झेंड्याच्या मध्यभागी असलेल्या चक्राला काय म्हणतात?", opt:["सुदर्शन चक्र","अशोक चक्र","कालचक्र","धर्मचक्र"], ans:1},
            {q:"आपल्या देशाचे नाव काय आहे?", opt:["महाराष्ट्र","भारत","आशिया","दिल्ली"], ans:1}
        ];

        // --- डेटा आणि गेम लॉजिक ---
        const gameData = {
            chota: { 
                title: "लहान गट (इ. ४ थी ते ७ वी)", 
                files: [
                    { name: "संच १ (सामान्य ज्ञान)", questions: setA },
                    { name: "संच २ (इतिहास व राष्ट्र)", questions: setB },
                    { name: "संच ३ (आंबेडकर विशेष)", questions: setC },
                    { name: "संच ४ (पर्यावरण व ज्ञान)", questions: setD },
                    { name: "संच ५ (विविध)", questions: setE }
                ] 
            },
            medium: { title: "मध्यम गट", files: [] }, // मध्यम व ओपन गटाचे प्रश्न येथे तुम्ही जोडू शकता
            open: { title: "ओपन गट", files: [] }
        };

        let currentQList = [];
        let index = 0;
        let timer;
        let timeLeft = 45;
        let lifelinesUsed = { '5050': false, 'poll': false };
        let chances = 2;

        function hideAll() {
            document.getElementById("landing").classList.add("hidden");
            document.getElementById("group-select").classList.add("hidden");
            document.getElementById("level-select").classList.add("hidden");
            document.getElementById("quiz-ready").classList.add("hidden");
            document.getElementById("game").classList.add("hidden");
        }

        function showGroups() {
            hideAll();
            document.getElementById("group-select").classList.remove("hidden");
        }

        function selectGroup(groupKey) {
            const group = gameData[groupKey];
            document.getElementById("level-title").innerText = group.title;
            const container = document.getElementById("level-buttons");
            container.innerHTML = "";
            group.files.forEach((file, i) => {
                const btn = document.createElement("button");
                btn.className = "btn-choice";
                btn.innerHTML = `संच ${i+1}:<br>${file.name}`;
                btn.onclick = () => prepareQuiz(file);
                container.appendChild(btn);
            });
            hideAll();
            document.getElementById("level-select").classList.remove("hidden");
        }

        function prepareQuiz(file) {
            currentQList = file.questions;
            index = 0;
            chances = 2;
            updateChanceUI();
            lifelinesUsed = { '5050': false, 'poll': false };
            updateLifelineUI();
            hideAll();
            document.getElementById("quiz-ready").classList.remove("hidden");
            document.getElementById("ready-info").innerText = `विषय: ${file.name}\nएकूण प्रश्न: ${currentQList.length}`;
            audioIntro.play();
        }

        function actualStartGame() {
            audioIntro.pause();
            audioIntro.currentTime = 0;
            hideAll();
            document.getElementById("game").classList.remove("hidden");
            loadQuestion();
        }

        function loadQuestion() {
            audioTimer.pause();
            timeLeft = 45;
            document.getElementById("timer").innerText = timeLeft;
            document.getElementById("timer-container").style.visibility = "hidden";
            document.getElementById("showOptionsBtn").classList.remove("hidden");
            document.getElementById("nextBtn").classList.add("hidden");
            
            const q = currentQList[index];
            document.getElementById("question-number").innerText = `प्रश्न: ${index + 1}/${currentQList.length}`;
            document.getElementById("question").innerText = q.q;
            
            const optionsDiv = document.getElementById("options");
            optionsDiv.innerHTML = "";
            const labels = ["A", "B", "C", "D"];
            q.opt.forEach((o, i) => {
                const btn = document.createElement("div");
                btn.className = "option";
                btn.innerHTML = `<span class="option-prefix">${labels[i]}:</span> ${o}`;
                btn.onclick = () => checkAns(i, btn);
                optionsDiv.appendChild(btn);
            });
        }

        function startQuestionTimer() {
            document.getElementById("showOptionsBtn").classList.add("hidden");
            document.getElementById("timer-container").style.visibility = "visible";
            const options = document.querySelectorAll(".option");
            options.forEach(opt => opt.style.visibility = "visible");
            
            audioTimer.play();
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById("timer").innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    audioTimer.pause();
                    alert("वेळ संपली!");
                    handleWrong();
                }
            }, 1000);
        }

        function checkAns(selected, btn) {
            clearInterval(timer);
            audioTimer.pause();
            btn.classList.add("locked");
            audioLock.play();
            
            setTimeout(() => {
                const correct = currentQList[index].ans;
                if (selected === correct) {
                    btn.classList.remove("locked");
                    btn.classList.add("correct");
                    audioCorrect.play();
                    document.getElementById("nextBtn").classList.remove("hidden");
                } else {
                    btn.classList.remove("locked");
                    btn.classList.add("wrong");
                    document.querySelectorAll(".option")[correct].classList.add("correct");
                    audioWrong.play();
                    handleWrong();
                }
            }, 2000);
        }

        function handleWrong() {
            chances--;
            updateChanceUI();
            if (chances > 0) {
                setTimeout(() => {
                    alert("चुकीचे उत्तर! पण तुमच्याकडे अजून एक संधी आहे.");
                    loadQuestion();
                }, 2000);
            } else {
                setTimeout(() => {
                    alert("खेळ संपला! तुम्ही छान खेळलात.");
                    showGroups();
                }, 2000);
            }
        }

        function nextQ() {
            index++;
            if (index < currentQList.length) {
                loadQuestion();
            } else {
                alert("अभिनंदन! तुम्ही सर्व प्रश्न पूर्ण केले.");
                showGroups();
            }
        }

        function updateChanceUI() {
            let heartStr = "संधी: ";
            for(let i=0; i<chances; i++) heartStr += "❤️ ";
            document.getElementById("chance-display").innerText = heartStr;
        }

        function updateLifelineUI() {
            document.getElementById("l-5050").classList.toggle("used", lifelinesUsed['5050']);
            document.getElementById("l-poll").classList.toggle("used", lifelinesUsed['poll']);
        }

        function useLifeline(type) {
            if (lifelinesUsed[type]) return;
            lifelinesUsed[type] = true;
            updateLifelineUI();
            
            if (type === '5050') {
                const correct = currentQList[index].ans;
                const options = document.querySelectorAll(".option");
                let removed = 0;
                options.forEach((opt, i) => {
                    if (i !== correct && removed < 2) {
                        opt.style.visibility = "hidden";
                        removed++;
                    }
                });
            } else if (type === 'poll') {
                alert("प्रेक्षकांचा कल योग्य उत्तराकडे ७०% आहे!");
            }
        }
    </script>
</body>
</html>
