<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBC Pro - Group Edition</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif;
            background: radial-gradient(circle at center, #1a1a4d 0%, #0a0a2e 70%, #05051a 100%);
            color: white; min-height: 100vh; display: flex;
            justify-content: center; align-items: center; overflow-x: hidden;
        }
        #landing, #group-select, #level-select, #quiz-ready, #game {
            width: 95%; max-width: 900px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background: rgba(10, 10, 50, 0.9); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 40px; border: 2px solid #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); margin: 10px;
        }
        .hidden { display: none !important; }
        .kbc-logo { width: 100px; margin-bottom: 10px; filter: drop-shadow(0 0 10px #ffd700); }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; width: 100%; }
        .lifeline-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .lifeline {
            width: 80px; height: 50px; border: 2px solid #ffd700; border-radius: 25px;
            background: rgba(255, 215, 0, 0.1); cursor: pointer; display: flex;
            justify-content: center; align-items: center; font-weight: bold; font-size: 16px;
            transition: 0.3s; color: #ffd700;
        }
        .lifeline:hover { background: #ffd700; color: #000; }
        .lifeline.used { opacity: 0.3; pointer-events: none; background: #555 !important; border-color: #888; color: #fff; }
        .chance-box {
            font-size: 18px; color: #ff4d4d; font-weight: bold; margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.1); padding: 5px 15px; border-radius: 20px;
        }
        .btn-choice {
            padding: 15px; border-radius: 15px; border: 2px solid #ffd700;
            background: rgba(255, 215, 0, 0.1); color: #ffd700; font-size: 16px;
            cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .btn-choice:hover { background: #ffd700; color: #000; }
        .btn-main {
            padding: 12px 40px; background: linear-gradient(180deg, #ffd700 0%, #b8860b 100%);
            border: 2px solid #fff; border-radius: 40px; cursor: pointer;
            font-weight: bold; font-size: 18px; color: #000; margin-top: 15px;
        }
        .question-box {
            width: 100%; padding: 20px; background: linear-gradient(90deg, #00004d 0%, #000099 50%, #00004d 100%);
            border-radius: 50px; border: 2px solid #ffd700; font-size: 20px; margin-bottom: 20px; box-sizing: border-box;
        }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .option {
            background: rgba(0, 0, 100, 0.7); padding: 12px; border-radius: 40px;
            border: 1.5px solid #4da6ff; cursor: pointer; font-size: 17px; transition: 0.2s; visibility: hidden;
            text-align: left; padding-left: 25px;
        }
        .option-prefix { color: #ffd700; font-weight: bold; margin-right: 10px; }
        .locked { background: #ffa500 !important; color: black; border-color: #fff; }
        .correct { background: #2ecc71 !important; color: white; border-color: #fff; }
        .wrong { background: #e74c3c !important; color: white; border-color: #fff; }
        #timer-container {
            width: 65px; height: 65px; border-radius: 50%; border: 3px solid #ffd700;
            display: flex; justify-content: center; align-items: center; font-size: 24px;
            margin-bottom: 10px; background: #cc0000; font-weight: bold; visibility: hidden;
        }
        .q-counter { color: #ffd700; font-size: 16px; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="landing">
        <img src="kbc.png" class="kbc-logo">
        <h1 style="color: #ffd700;">“भीम ज्ञान स्पर्धा 2026”</h1>
        <button class="btn-main" onclick="showGroups()">खेळायला सुरुवात करा</button>
    </div>

    <div id="group-select" class="hidden">
        <h2 style="color: #ffd700;">तुमचा गट निवडा</h2>
        <div class="grid-container">
            <button class="btn-choice" onclick="selectGroup('chota')">१. लहान गट<br>(इ. ४ थी ते ७ वी)</button>
            <button class="btn-choice" onclick="selectGroup('medium')">२. मध्यम गट<br>(इ. ८ वी ते १० वी)</button>
            <button class="btn-choice" onclick="selectGroup('open')">३. ओपन गट<br>(सर्व वयोगट)</button>
        </div>
    </div>

    <div id="level-select" class="hidden">
        <h2 id="level-title" style="color: #ffd700;">विषय निवडा</h2>
        <div class="grid-container" id="level-buttons"></div>
        <button class="btn-main" onclick="showGroups()" style="font-size: 14px;">मागे जा</button>
    </div>

    <div id="quiz-ready" class="hidden">
        <h2 id="ready-title" style="color: #ffd700;">तुम्ही तयार आहात का?</h2>
        <p id="ready-info" style="font-size: 18px; white-space: pre-line;"></p>
        <button class="btn-main" onclick="actualStartGame()">क्विझ सुरू करा!</button>
    </div>

    <div id="game" class="hidden">
        <div class="lifeline-container">
            <div class="lifeline" id="l-5050" onclick="useLifeline('5050')">50:50</div>
            <div class="lifeline" id="l-poll" onclick="useLifeline('poll')">👥 Poll</div>
        </div>
        <div class="chance-box" id="chance-display">संधी: ❤️ ❤️</div>
        <div class="q-counter" id="question-number">प्रश्न: ०/०</div>
        <div id="timer-container"><span id="timer">45</span></div>
        <div class="question-box" id="question">प्रश्न लोड होत आहे...</div>
        <div class="options" id="options"></div>
        <button id="showOptionsBtn" class="btn-main" onclick="startQuestionTimer()">पर्याय दाखवा आणि वेळ सुरू करा</button>
        <button id="nextBtn" class="btn-main hidden" onclick="nextQ()">पुढचा प्रश्न</button>
    </div>

    <script>
        const audioIntro = new Audio('intro.mp3');
        const audioTimer = new Audio('timer.mp3');
        const audioLock = new Audio('lock.mp3');
        const audioCorrect = new Audio('correct.mp3');
        const audioWrong = new Audio('wrong.mp3');
        audioTimer.loop = true;

        // --- लहान गट नवीन संच १ (Updated) ---
        const chota_set1 = [
            { q: "डॉ. बाबासाहेब आंबेडकर कोण होते?", opt: ["कवी", "समाजसुधारक", "सैनिक", "कलाकार"], ans: 1 },
            { q: "भारतात कायदे कोण बनवते?", opt: ["संसद", "न्यायालय", "पोलिस", "जनता"], ans: 0 },
            { q: "महात्मा ज्योतिराव फुले यांनी काय सुरू केले?", opt: ["मंदिर", "बँक", "शाळा", "कारखाना"], ans: 2 }
        ];

        // --- लहान गट नवीन संच २ ---
        const chota_set2 = [
            { q: "बाबासाहेबांनी कोणासाठी लढा दिला?", opt: ["व्यापारी", "सैनिक", "दलित", "श्रीमंत"], ans: 2 },
            { q: "मूलभूत हक्क म्हणजे काय?", opt: ["कर", "शिक्षा", "नियम", "अधिकार"], ans: 3 },
            { q: "राजर्षी शाहू महाराज कशासाठी प्रसिद्ध आहेत?", opt: ["आरक्षण", "युद्ध", "कला", "क्रीडा"], ans: 0 },
            { q: "बाबासाहेबांचे घोषवाक्य काय?", opt: ["जय हिंद", "वंदे मातरम", "सत्यमेव जयते", "शिका, संघटित व्हा, संघर्ष करा"], ans: 3 }
        ];

        // --- मध्यम गट संच (पूर्वत: प्रमाणे) ---
        const set1 = [
            { q: "देशाचा प्रथम नागरिक कोण असतो?", opt: ["पंतप्रधान", "मुख्यमंत्री", "राष्ट्रपती", "न्यायमूर्ती"], ans: 2 },
            { q: "डॉ. बाबासाहेब आंबेडकर यांना काय म्हटले जाते?", opt: ["राष्ट्रपिता", "राज्यघटनेचे शिल्पकार", "लोहमनुष्य", "जननायक"], ans: 1 },
            { q: "डॉ. बाबासाहेब आंबेडकर यांच्या पत्नीचे नाव काय?", opt: ["सावित्रीबाई", "रमाबाई", "जिजाबाई", "कस्तुरबा"], ans: 1 },
            { q: "राजर्षी छत्रपती शाहू महाराज यांचे मूळ नाव काय होते?", opt: ["संभाजीराजे", "यशवंतराव घाडगे", "शाहाजीराजे", "बालाजी"], ans: 1 },
            { q: "महात्मा ज्योतिराव फुले यांनी मुलींची पहिली शाळा कोठे सुरू केली?", opt: ["मुंबई", "सातारा", "पुणे (भिडे वाडा)", "नागपूर"], ans: 2 },
            { q: "भारतीय राज्यघटना कधी स्वीकारली?", opt: ["15 ऑगस्ट 1947", "26 जानेवारी 1950", "26 नोव्हेंबर 1949", "2 ऑक्टोबर 1948"], ans: 2 },
            { q: "छत्रपती शिवाजी महाराज यांनी वयाच्या १६ व्या वर्षी कोणता किल्ला जिंकला?", opt: ["राजगड", "सिंहगड", "तोरणा", "रायगड"], ans: 2 },
            { q: "चवदार तळे कोठे आहे?", opt: ["पुणे", "मुंबई", "महाड", "नाशिक"], ans: 2 },
            { q: "गौतम बुद्ध यांचे जन्मस्थान कोणते?", opt: ["बोधगया", "लुंबिनी", "सारनाथ", "कुशीनगर"], ans: 1 },
            { q: "डॉ. बाबासाहेब आंबेडकर यांचे स्मारक कोठे आहे?", opt: ["दिल्ली", "नागपूर", "मुंबई (दादर)", "पुणे"], ans: 2 }
        ];

        const set2 = [
            { q: "गौतम बुद्ध यांचे मूळ नाव काय?", opt: ["सिद्धार्थ", "अशोक", "महावीर", "राहुल"], ans: 0 },
            { q: "राजर्षी छत्रपती शाहू महाराज यांनी शिक्षणासाठी काय केले?", opt: ["कर वाढवला", "मोफत शिक्षण सुरू केले", "युद्ध केले", "कर कमी केला"], ans: 1 },
            { q: "महात्मा ज्योतिराव फुले यांचे पूर्ण नाव काय?", opt: ["ज्योतिराव गोविंदराव फुले", "ज्योतिराव तुकाराम फुले", "ज्योतिराव रामराव फुले", "ज्योतिराव शिवराम फुले"], ans: 0 },
            { q: "भारताचे पहिले कायदा मंत्री कोण होते?", opt: ["महात्मा गांधी", "जवाहरलाल नेहरू", "डॉ. बाबासाहेब आंबेडकर", "सरदार वल्लभभाई पटेल"], ans: 2 },
            { q: "डॉ. बाबासाहेब आंबेडकर यांच्या शिक्षणासाठी मदत कोणी केली?", opt: ["गांधीजी", "शाहू महाराज", "नेहरू", "टिळक"], ans: 1 },
            { q: "छत्रपती शाहू महाराज यांनी कोल्हापुरात कोणते धरण बांधले?", opt: ["कोयना धरण", "खडकवासला धरण", "राधानगरी धरण", "उजनी धरण"], ans: 2 },
            { q: "महाड सत्याग्रह कशासाठी होता?", opt: ["जमीन", "पाणी", "शिक्षण", "कर"], ans: 1 },
            { q: "बाबासाहेबांचे मूळ गाव कोणते?", opt: ["महू", "आंबडवे", "मुंबई", "पुणे"], ans: 1 },
            { q: "डॉ. बाबासाहेब आंबेडकर यांनी बौद्ध धर्म स्वीकारला तो दिवस कोणता?", opt: ["15 ऑगस्ट 1947", "26 जानेवारी 1950", "14 ऑक्टोबर 1956", "2 ऑक्टोबर 1956"], ans: 2 },
            { q: "“गड आला पण सिंह गेला” हे वाक्य कोणी म्हटले?", opt: ["छत्रपती शिवाजी महाराज", "तानाजी मालुसरे", "सूर्याजी मालुसरे", "शेलार मामा"], ans: 0 }
        ];

        const set3 = [
            { q: "डॉ. बाबासाहेब आंबेडकर यांचा जन्म कोठे झाला?", opt: ["पुणे", "मुंबई", "महू (मध्य प्रदेश)", "दिल्ली"], ans: 2 },
            { q: "डॉ. बाबासाहेब आंबेडकर हे त्यांच्या आई-वडिलांचे कितवे अपत्य होते?", opt: ["10वे", "12वे", "14वे", "16वे"], ans: 2 },
            { q: "स्वतंत्र भारताचे पहिले पंतप्रधान कोण होते?", opt: ["महात्मा गांधी", "जवाहरलाल नेहरू", "सरदार वल्लभभाई पटेल", "राजेंद्र प्रसाद"], ans: 1 },
            { q: "भारतीय संविधान कधी अमलात आले?", opt: ["15 ऑगस्ट 1947", "26 जानेवारी 1950", "26 नोव्हेंबर 1949", "2 ऑक्टोबर 1950"], ans: 1 },
            { q: "रमाबाई आंबेडकर यांचे मूळ गाव कोणते?", opt: ["नागपूर", "पुणे", "वणंद (रत्नागिरी)", "मुंबई"], ans: 2 },
            { q: "बौद्ध धर्माचा प्रसार कोणी केला?", opt: ["महावीर", "सम्राट अशोक", "चंद्रगुप्त", "हर्षवर्धन"], ans: 1 },
            { q: "राजर्षी छत्रपती शाहू महाराज कोणत्या संस्थानाचे राजे होते?", opt: ["सातारा", "कोल्हापूर", "नागपूर", "इंदूर"], ans: 1 },
            { q: "डॉ. बाबासाहेब आंबेडकर म्हणतात “शिक्षण हे ____ आहे”?", opt: ["म्हशीचे दुध", "गाईचे दूध", "वाघिणीचे दूध", "शेळीचे दूध"], ans: 2 },
            { q: "डॉ. बाबासाहेब आंबेडकर यांनी बहुजन समाजाला कोणता संदेश दिला?", opt: ["स्वराज्य हा माझा जन्मसिद्ध हक्क आहे", "जय जवान जय किसान", "शिका, संघटित व्हा, संघर्ष करा", "करो या मरो"], ans: 2 },
            { q: "भारतात कायदे कोण बनवते?", opt: ["राष्ट्रपती", "सर्वोच्च न्यायालय", "संसद", "पंतप्रधान"], ans: 2 }
        ];

        const set4 = [
            { q: "डॉ. बाबासाहेब आंबेडकर यांचा जन्म कधी झाला?", opt: ["15 ऑगस्ट 1947", "26 जानेवारी 1950", "14 एप्रिल 1891", "2 ऑक्टोबर 1869"], ans: 2 },
            { q: "भारताचे राष्ट्रगीत कोणते?", opt: ["वंदे मातरम्", "जन गण मन", "सारे जहाँ से अच्छा", "ऐ मेरे वतन के लोगों"], ans: 1 },
            { q: "छत्रपती शिवाजी महाराज यांच्या वडिलांचे नाव काय?", opt: ["तानाजी मालुसरे", "बाजीराव पेशवे", "शाहाजीराजे भोसले", "संभाजीराजे"], ans: 2 },
            { q: "बाबासाहेबांची आई कोण?", opt: ["रमाबाई", "भीमाबाई", "सावित्रीबाई", "जिजाबाई"], ans: 1 },
            { q: "भारतीय संविधान तयार करण्यासाठी किती कालावधी लागला?", opt: ["1 वर्ष", "2 वर्षे 11 महिने 18 दिवस", "3 वर्षे", "5 वर्षे"], ans: 1 },
            { q: "सावित्रीबाई फुले यांनी कोणते कार्य केले?", opt: ["स्वातंत्र्य चळवळ चालवली", "पहिली मुलींची शाळा सुरू केली", "संविधान लिहिले", "सैन्य उभारले"], ans: 1 },
            { q: "बाबासाहेबांनी कोणते वृत्तपत्र सुरू केले?", opt: ["केसरी", "मराठा", "मूकनायक", "लोकमत"], ans: 2 },
            { q: "बाबासाहेबांचे निधन कोठे झाले?", opt: ["मुंबई", "नागपूर", "दिल्ली", "पुणे"], ans: 2 },
            { q: "भारतीय संविधानात मूळ किती कलमे होती?", opt: ["200", "300", "284", "395"], ans: 3 },
            { q: "डॉ बाबासाहेब आंबेडकरांनी भीमा कोरेगाव येथील विजय स्तंभाला कधी भेट दिली?", opt: ["1 जानेवारी 1927", "14 एप्रिल 1918", "17 मार्च 1956", "30 नोव्हेंबर 1949"], ans: 0 }
        ];

        const set5 = [
            { q: "सत्यशोधक समाज कोणी स्थापना केला?", opt: ["लोकमान्य टिळक", "महात्मा ज्योतिराव फुले", "महात्मा गांधी", "बाबासाहेब आंबेडकर"], ans: 1 },
            { q: "कोलंबिया विद्यापीठ कोणत्या देशात आहे?", opt: ["भारत", "इंग्लंड", "अमेरिका", "जपान"], ans: 2 },
            { q: "काळाराम मंदिर कोठे आहे?", opt: ["पुणे", "मुंबई", "नाशिक", "नागपूर"], ans: 2 },
            { q: "गौतम बुद्धांना ज्ञान कोणत्या वृक्षाखाली मिळाले?", opt: ["वड", "आंबा", "बोधी वृक्ष", "नारळ"], ans: 2 },

            document.getElementById("ready-info").innerText = `विषय: ${file.name}\nएकूण प्रश्न: ${currentQList.length}`;
            stopAllAudio(); audioIntro.play();
        }

        function actualStartGame() {
            stopAllAudio(); hideAll();
            document.getElementById("game").classList.remove("hidden");
            loadQuestion();
        }

        function loadQuestion() {
            stopAllAudio();
            clearInterval(timer);
            timeLeft = 45;
            document.getElementById("timer").innerText = timeLeft;
            document.getElementById("timer-container").style.visibility = "hidden";
            document.getElementById("nextBtn").classList.add("hidden");
            document.getElementById("showOptionsBtn").classList.remove("hidden");
            document.getElementById("question-number").innerText = `प्रश्न: ${index + 1} / ${currentQList.length}`;
            
            let q = currentQList[index];
            document.getElementById("question").innerText = q.q;
            
            let html = "";
            q.opt.forEach((o, i) => {
                html += `<div class="option" id="opt-${i}" onclick="handleLock(${i}, this)">
                            <span class="option-prefix">${optionLabels[i]}:</span> ${o}
                         </div>`;
            });
            document.getElementById("options").innerHTML = html;
        }

        function startQuestionTimer() {
            document.getElementById("showOptionsBtn").classList.add("hidden");
            document.getElementById("timer-container").style.visibility = "visible";
            const opts = document.querySelectorAll(".option");
            opts.forEach(opt => {
                opt.style.visibility = "visible";
                opt.style.pointerEvents = "auto";
            });
            audioTimer.play();
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById("timer").innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer); stopAllAudio();
                    audioWrong.play(); alert("वेळ संपली!"); showGroups();
                }
            }, 1000);
        }

        function handleLock(i, el) {
            clearInterval(timer); stopAllAudio();
            audioLock.play();
            const opts = document.querySelectorAll(".option");
            opts.forEach(opt => opt.style.pointerEvents = "none");
            el.classList.add("locked");
            setTimeout(() => checkAnswer(i, el), 2000);
        }

        function checkAnswer(i, el) {
            const correct = currentQList[index].ans;
            el.classList.remove("locked");
            
            if (i === correct) {
                el.classList.add("correct");
                audioCorrect.play();
                document.getElementById("nextBtn").classList.remove("hidden");
            } else {
                chances--;
                updateChanceUI();
                el.classList.add("wrong");
                audioWrong.play();
                
                if (chances > 0) {
                    setTimeout(() => {
                        alert(`चुकीचे उत्तर! तुमच्याकडे अजून १ संधी शिल्लक आहे.`);
                        el.style.visibility = "hidden";
                        startQuestionTimer();
                    }, 1000);
                } else {
                    setTimeout(() => {
                        alert(`गेम ओव्हर! अचूक उत्तर ${optionLabels[correct]} होते.`);
                        showGroups();
                    }, 1500);
                }
            }
        }

        function updateChanceUI() {
            let heart = "संधी: ";
            for(let i=0; i<chances; i++) heart += "❤️ ";
            if(chances === 0) heart = "संधी संपल्या!";
            document.getElementById("chance-display").innerText = heart;
        }

        function useLifeline(type) {
            if (lifelinesUsed[type]) return;
            const q = currentQList[index];
            const correctIdx = q.ans;
            
            if (type === '5050') {
                lifelinesUsed[type] = true;
                document.getElementById(`l-${type}`).classList.add("used");
                let removed = 0;
                for (let i = 0; i < 4; i++) {
                    if (i !== correctIdx && removed < 2) {
                        document.getElementById(`opt-${i}`).style.visibility = "hidden";
                        removed++;
                    }
                }
            } else if (type === 'poll') {
                lifelinesUsed[type] = true;
                document.getElementById(`l-${type}`).classList.add("used");
                alert("प्रेक्षकांचा कल तपासत आहे... बहुतांश प्रेक्षक " + optionLabels[correctIdx] + " पर्यायासोबत आहेत.");
            }
        }

        function updateLifelineUI() {
            ['5050', 'poll'].forEach(t => {
                const el = document.getElementById(`l-${t}`);
                if(el) el.classList.remove("used");
            });
        }

        function nextQ() {
            index++;
            if (index < currentQList.length) { loadQuestion(); }
            else { stopAllAudio(); alert("अभिनंदन! तुम्ही हा संच यशस्वीरीत्या पूर्ण केला आहे."); showGroups(); }
        }

        function hideAll() {
            ["landing", "group-select", "level-select", "quiz-ready", "game"].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.classList.add("hidden");
            });
        }
    </script>
</body>
</html>
